<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content" />
  <meta name="theme-color" content="#000000" />
  <title>Onay Mühendislik - İş Takip Sistemi</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/logo192.png">

  <!-- Google Fonts - Inter + Oswald -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Oswald:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* Global Font */
    * {
      font-family: 'Inter', sans-serif;
    }

    /* Glassmorphism Effects */
    .glass {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
    }

    /* Smooth Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes pulse-glow {

      0%,
      100% {
        box-shadow: 0 0 20px rgba(59, 130, 246, 0.3);
      }

      50% {
        box-shadow: 0 0 40px rgba(59, 130, 246, 0.6);
      }
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-5px);
      }
    }

    .animate-fadeIn {
      animation: fadeIn 0.5s ease-out;
    }

    .animate-slideIn {
      animation: slideIn 0.3s ease-out;
    }

    .animate-glow {
      animation: pulse-glow 2s ease-in-out infinite;
    }

    .animate-float {
      animation: float 3s ease-in-out infinite;
    }
  </style>


  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            gray: {
              750: '#2d3748',
              850: '#1a202c',
              950: '#0d1117',
            },
            brand: {
              50:  '#fff7ed',
              100: '#ffedd5',
              200: '#fed7aa',
              400: '#fb923c',
              500: '#f97316',
              600: '#ea580c',
              700: '#c2410c',
              800: '#9a3412',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            oswald: ['Oswald', 'sans-serif'],
          },
          backgroundImage: {
            'grid-pattern': `url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23cbd5e1' fill-opacity='0.18' fill-rule='evenodd'%3E%3Cpath d='M0 40L40 0H20L0 20M40 40V20L20 40'/%3E%3C/g%3E%3C/svg%3E")`,
          },
          animation: {
            'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          }
        }
      }
    }
  </script>
  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body class="bg-[#1e293b] text-slate-100 antialiased overflow-hidden">
  <div id="particles-js" style="position: fixed; width: 100vw; height: 100vh; top: 0; left: 0; z-index: -2;"></div>
  <div id="root" class="h-screen w-screen flex flex-col relative z-0"></div>
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
  <script>
    window.initParticles = function(isDark) {
      const pColor = isDark ? "#ffffff" : "#000000";
      const bgColor = isDark ? "bg-[#1e293b]" : "bg-slate-50";
      
      // Update body classes
      document.body.className = `${bgColor} text-slate-100 antialiased overflow-hidden transition-colors duration-500`;

      // Destroy existing particles if any
      if (window.pJSDom && window.pJSDom.length > 0) {
        window.pJSDom[0].pJS.fn.vendors.destroypJS();
        window.pJSDom = [];
      }

      if(window.particlesJS) {
        particlesJS("particles-js", {
          "particles": {
            "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
            "color": { "value": pColor },
            "shape": { "type": "circle" },
            "opacity": { "value": isDark ? 0.6 : 0.3, "random": false },
            "size": { "value": 3, "random": true },
            "line_linked": { "enable": true, "distance": 120, "color": pColor, "opacity": isDark ? 0.3 : 0.15, "width": 1 },
            "move": { "enable": true, "speed": 0.5, "direction": "none", "random": true, "straight": false, "out_mode": "out", "bounce": false }
          },
          "interactivity": {
            "detect_on": "window",
            "events": {
              "onhover": { "enable": false, "mode": "grab" },
              "onclick": { "enable": false, "mode": "push" },
              "resize": true
            },
            "modes": {
              "grab": { "distance": 250, "line_linked": { "opacity": isDark ? 0.8 : 0.5 } },
              "push": { "particles_nb": 4 }
            }
          },
          "retina_detect": true
        });
      }
    };

    // Initialize particles initially with dark theme as default
    document.addEventListener("DOMContentLoaded", function() {
      // The React app will call initParticles once it reads localStorage, 
      // but we can set a safe default just in case.
      window.initParticles(true);
    });
  </script>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
